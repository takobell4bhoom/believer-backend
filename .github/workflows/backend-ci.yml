name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: believer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d believer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/believer
      JWT_SECRET: ci_test_secret_key_minimum_32_chars_value_here
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      CORS_ORIGIN: http://localhost:3000
      GOOGLE_MAPS_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run syntax check
        run: npm --workspace backend run check

      - name: Run smoke tests
        run: npm --workspace backend run test

      - name: Run integration tests
        run: npm --workspace backend run test:integration
