name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: believer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d believer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/believer
      JWT_SECRET: ci_test_secret_key_minimum_32_chars_value_here
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      CORS_ORIGIN: http://localhost:3000
      GOOGLE_MAPS_API_KEY: ""
      PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [[ -z "${PROD_API_BASE_URL}" ]]; then
            echo "GitHub secret PROD_API_BASE_URL is required."
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run backend syntax check
        run: npm --workspace backend run check

      - name: Run backend smoke tests
        run: npm --workspace backend run test

      - name: Run backend integration tests
        run: npm --workspace backend run test:integration

      - name: Build Flutter web release
        run: flutter build web --release --dart-define=API_BASE_URL="${PROD_API_BASE_URL}"

      - name: Package frontend artifact
        run: tar -czf believer-web.tar.gz -C build/web .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: believer-web
          path: believer-web.tar.gz
          if-no-files-found: error
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: validate-and-build
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
      PROD_APP_USER: ${{ secrets.PROD_APP_USER }}
      PROD_APP_GROUP: ${{ secrets.PROD_APP_GROUP }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}

    steps:
      - name: Validate deploy secrets
        run: |
          set -euo pipefail

          required_vars=(
            PROD_HOST
            PROD_USER
            PROD_SSH_PRIVATE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              echo "GitHub secret ${var_name} is required."
              exit 1
            fi
          done

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: believer-web
          path: .

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${PROD_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${PROD_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_PORT:-22}" "${PROD_HOST}" > ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Upload frontend artifact to server
        run: |
          set -euo pipefail
          scp \
            -i ~/.ssh/id_ed25519 \
            -P "${PROD_PORT:-22}" \
            believer-web.tar.gz \
            "${PROD_USER}@${PROD_HOST}:/tmp/believer-web.tar.gz"

      - name: Run remote release
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" "
            set -euo pipefail
            APP_DIR='${PROD_APP_DIR:-/var/www/believer}'
            APP_USER='${PROD_APP_USER:-${PROD_USER}}'
            APP_GROUP='${PROD_APP_GROUP:-${PROD_APP_USER:-${PROD_USER}}}'
            WEB_SOURCE_DIR='/tmp/believer-web'
            rm -rf \"\$WEB_SOURCE_DIR\"
            mkdir -p \"\$WEB_SOURCE_DIR\"
            tar -xzf /tmp/believer-web.tar.gz -C \"\$WEB_SOURCE_DIR\"
            APP_DIR=\"\$APP_DIR\" \
            APP_USER=\"\$APP_USER\" \
            APP_GROUP=\"\$APP_GROUP\" \
            BRANCH='${GITHUB_REF_NAME}' \
            WEB_SOURCE_DIR=\"\$WEB_SOURCE_DIR\" \
            bash \"\$APP_DIR/deploy/scripts/deploy_release.sh\"
            rm -rf \"\$WEB_SOURCE_DIR\"
            rm -f /tmp/believer-web.tar.gz
          "
