            - $ref: '#/components/schemas/BusinessListingSelectedType'
          nullable: true
        tagline:
          type: string
          maxLength: 160
        description:
          type: string
          maxLength: 4000

    BusinessListingBasicDraftDetails:
      type: object
      properties:
        businessName:
          type: string
          maxLength: 180
        logo:
          allOf:
            - $ref: '#/components/schemas/BusinessListingLogo'
          nullable: true
        selectedType:
          allOf:
            - $ref: '#/components/schemas/BusinessListingSelectedType'
          nullable: true
        tagline:
          type: string
          maxLength: 160
        description:
          type: string
          maxLength: 4000

    BusinessListingContactDetails:
      type: object
      required:
