            - $ref: '#/components/schemas/BusinessListing'
          nullable: true

    BusinessListingEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BusinessListingPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BusinessListingListPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BusinessListing'

    BusinessListingListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BusinessListingListPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BusinessListingRejectionRequest:
      type: object
      required: [rejectionReason]
      properties:
        rejectionReason:
          type: string
          minLength: 3
          maxLength: 1000

    Service:
      type: object
      required:
        [id, category, name, location, priceRange, deliveryInfo, rating, tags, servicesOffered, specialties]
      properties:
        id:
          type: string
        category:
          type: string
        name:
          type: string
        location:
          type: string
        priceRange:
          type: string
        deliveryInfo:
          type: string
        rating:
          type: number
        addressLine1:
          type: string
        addressLine2:
          type: string
        phoneNumber:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        instagramHandle:
          type: string
          nullable: true
        facebookPage:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        description:
          type: string
        hoursLabel:
          type: string
        savedCount:
          type: integer
        reviewCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        servicesOffered:
          type: array
          items:
            type: string
        specialties:
          type: array
          items:
            type: string

    ServicesEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          type: object
          required: [services]
          properties:
            services:
              type: array
              items:
                $ref: '#/components/schemas/Service'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

paths:
  /:
    get:
      tags: [Health]
      summary: Root API metadata
      responses:
        '200':
          description: API metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                  version:
                    type: string
                  docs:
                    type: object
                    properties:
                      openapi:
                        type: string
                      postmanCollection:
                        type: string

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                example:
                  status: ok

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create account
      description: Community signup is the default. Mosque admin signup is also supported through the same full-name, email, and password flow by setting `accountType=admin`. After a successful signup, the backend attempts a lightweight welcome email without blocking account creation if delivery fails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: Returns the same success payload whether or not the email belongs to an active account. Requires configured transactional email and sends a one-time reset link through the backend email service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Email provider failed to deliver the reset email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Password reset email is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with a one-time token
      description: Consumes a hashed single-use reset token, updates the password, and revokes previously issued refresh-token state for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFlagEnvelope'
        '400':
          description: Invalid or expired reset token, or malformed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Updated current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          description: Invalid profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed and tokens rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
        '400':
          description: Invalid payload or wrong current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFlagEnvelope'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/deactivate:
    post:
      tags: [Auth]
      summary: Deactivate the authenticated account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateAccountRequest'
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/account/support-requests:
    post:
      tags: [Account Governance]
      summary: Submit a support/contact request for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportRequest'
      responses:
        '201':
          description: Support request stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/account/mosque-suggestions:
    post:
      tags: [Account Governance]
      summary: Submit a mosque suggestion for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MosqueSuggestionRequest'
      responses:
        '201':
          description: Mosque suggestion stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/mosques:
    post:
      tags: [Mosques]
      summary: Create a mosque as an admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MosqueCreateRequest'
      responses:
        '201':
          description: Mosque created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MosqueEnvelope'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required or mosque not owned by current admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Mosque already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Mosques]
      summary: List mosques with filters and pagination
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: city
          in: query
          schema: { type: string }
        - name: facilities
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, recent, distance]
            default: recent
        - name: latitude
          in: query
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: longitude
          in: query
          schema: { type: number, minimum: -180, maximum: 180 }
        - name: radius
          in: query
          schema: { type: number, minimum: 0.1, maximum: 50, default: 10 }
        - name: lat
          in: query
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: lng
          in: query
          schema: { type: number, minimum: -180, maximum: 180 }
        - name: radiusKm
          in: query
          schema: { type: number, minimum: 0.1, maximum: 50 }
      responses:
        '200':
          description: Mosque list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MosqueListEnvelope'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/mosques/upload-image:
    post:
      tags: [Mosques]
      summary: Upload a mosque image as an admin user
      description: Stores the uploaded image on backend-local disk for MVP use and returns a reusable static image URL for mosque create/update payloads.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MosqueImageUploadRequest'
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MosqueImageUploadEnvelope'
        '400':
          description: Invalid or missing file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required or mosque not owned by current admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Upload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/mosques/nearby:
    get:
      tags: [Mosques]
      summary: Nearby mosques by coordinates
      parameters:
        - name: latitude
          in: query
          required: true
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: longitude
          in: query
          required: true
          schema: { type: number, minimum: -180, maximum: 180 }
        - name: radius
          in: query
          schema: { type: number, minimum: 0.1, maximum: 50, default: 5 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: lat
          in: query
          schema: { type: number, minimum: -90, maximum: 90 }
        - name: lng
          in: query
          schema: { type: number, minimum: -180, maximum: 180 }
        - name: radiusKm
          in: query
          schema: { type: number, minimum: 0.1, maximum: 50 }
      responses:
        '200':
          description: Nearby results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MosqueListEnvelope'
        '400':
          description: Invalid coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/mosques/location-resolve:
    get:
      tags: [Mosques]
      summary: Resolve the manual-location fallback query into coordinates
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
      responses:
        '200':
          description: Location resolution result
          content:
            application/json:
              schema:
                type: object
                required: [data, error, meta]
                properties:
                  data:
                    type: object
                    required: [label, latitude, longitude, provider, resolved]
                    properties:
                      label:
                        type: string
                        nullable: false
                      latitude:
                        type: number
                        nullable: true
                      longitude:
                        type: number
                        nullable: true
                      provider:
                        type: string
                        nullable: true
                      resolved:
                        type: boolean
                  error:
                    nullable: true
                    example: null
                  meta:
                    type: object
                    example: {}
        '400':
          description: Invalid lookup params
          content:
