          type: string
          maxLength: 254
        phone:
          type: string
          maxLength: 40
        whatsapp:
          type: string
          maxLength: 40
        openingTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          nullable: true
        closingTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          nullable: true
        instagramUrl:
          type: string
          maxLength: 240
        facebookUrl:
          type: string
          maxLength: 240
        websiteUrl:
          type: string
          maxLength: 240
        address:
          type: string
          maxLength: 240
        zipCode:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 120
        onlineOnly:
          type: boolean

    BusinessListingContactDraftDetails:
      type: object
      properties:
        businessEmail:
          type: string
          maxLength: 254
        phone:
          type: string
          maxLength: 40
        whatsapp:
          type: string
          maxLength: 40
        openingTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          nullable: true
        closingTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          nullable: true
        instagramUrl:
          type: string
          maxLength: 240
        facebookUrl:
          type: string
          maxLength: 240
        websiteUrl:
          type: string
          maxLength: 240
        address:
          type: string
          maxLength: 240
        zipCode:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 120
        onlineOnly:
          type: boolean

    BusinessListingDraftRequest:
      type: object
      required: [basicDetails, contactDetails]
      properties:
        basicDetails:
          $ref: '#/components/schemas/BusinessListingBasicDraftDetails'
        contactDetails:
          $ref: '#/components/schemas/BusinessListingContactDraftDetails'

    BusinessListingSubmissionRequest:
      type: object
      required: [basicDetails, contactDetails]
      properties:
        basicDetails:
          $ref: '#/components/schemas/BusinessListingBasicDetails'
        contactDetails:
          $ref: '#/components/schemas/BusinessListingContactDetails'

    BusinessListing:
      type: object
      required:
        [
          id,
          status,
          basicDetails,
          contactDetails,
          submittedAt,
          publishedAt,
          reviewedBy,
          reviewedAt,
          rejectionReason,
          createdAt,
          lastUpdatedAt
        ]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BusinessListingStatus'
        basicDetails:
          $ref: '#/components/schemas/BusinessListingBasicDetails'
        contactDetails:
          $ref: '#/components/schemas/BusinessListingContactDetails'
        submittedAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        reviewedBy:
          type: string
          format: uuid
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        submitter:
          allOf:
            - $ref: '#/components/schemas/BusinessListingSubmitter'
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        lastUpdatedAt:
          type: string
          format: date-time
          nullable: true

