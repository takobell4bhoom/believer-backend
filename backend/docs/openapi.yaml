openapi: 3.0.3
info:
  title: Believer Backend API
  version: 1.8.0
  description: Active REST API contract for auth, account recovery, account-governance settings actions, business listings, mosques, backend-owned mosque prayer times, mosque page content, mosque image uploads, bookmarks, notifications, and services.
servers:
  - url: http://localhost:4000

tags:
  - name: Health
  - name: Auth
  - name: Account Governance
  - name: Business Listings
  - name: Mosques
  - name: Bookmarks
  - name: Notifications
  - name: Services

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid request payload
        details:
          type: array
          items:
            type: object

    ErrorResponse:
      type: object
      required: [data, error, meta]
      properties:
        data:
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          type: object
          example: {}

    PaginationMeta:
      type: object
      required: [pagination]
      properties:
        pagination:
          type: object
          required: [page, limit, total, hasNext]
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            total:
              type: integer
              example: 42
            hasNext:
              type: boolean
              example: true

    User:
      type: object
      required: [id, fullName, email, role]
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [community, admin, super_admin]

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    AuthPayload:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/TokenPair'

    AuthEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    RefreshPayload:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    RefreshEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/RefreshPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    UserEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/User'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    SuccessFlagEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success:
              type: boolean
              example: true
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    SuccessMessageEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          type: object
          required: [success, message]
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: If an account exists for that email, a password reset link has been sent.
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    SignupRequest:
      type: object
      required: [fullName, email, password]
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        accountType:
          type: string
          enum: [community, admin]
          default: community

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 512
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UserUpdateRequest:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    DeactivateAccountRequest:
      type: object
      required: [confirmation]
      properties:
        confirmation:
          type: string
          enum: [DEACTIVATE]

    SupportRequest:
      type: object
      required: [subject, message]
      properties:
        subject:
          type: string
          minLength: 4
          maxLength: 120
        message:
          type: string
          minLength: 10
          maxLength: 4000

    MosqueSuggestionRequest:
      type: object
      required: [mosqueName, city, country]
      properties:
        mosqueName:
          type: string
          minLength: 2
          maxLength: 180
        city:
          type: string
          minLength: 2
          maxLength: 120
        country:
          type: string
          minLength: 2
          maxLength: 120
        addressLine:
          type: string
          maxLength: 240
        notes:
          type: string
          maxLength: 2000

    Mosque:
      type: object
      required:
        [id, name, city, country, latitude, longitude, facilities, averageRating, totalReviews, classTags, eventTags, isVerified, isBookmarked, canEdit]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        addressLine:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        country:
          type: string
        postalCode:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number
        imageUrl:
          type: string
          nullable: true
        imageUrls:
          type: array
          maxItems: 10
          items:
            type: string
            format: uri
        sect:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        duhrTime:
          type: string
          nullable: true
        asrTime:
          type: string
          nullable: true
        facilities:
          type: array
          items:
            type: string
        averageRating:
          type: number
          example: 4.7
        totalReviews:
          type: integer
          example: 18
        classTags:
          type: array
          items:
            type: string
        eventTags:
          type: array
          items:
            type: string
        isVerified:
          type: boolean
        distanceKm:
          type: number
          nullable: true
        isBookmarked:
          type: boolean
        canEdit:
          type: boolean

    MosqueListPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Mosque'

    MosqueListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/MosqueListPayload'
        error:
          nullable: true
          example: null
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    MosqueEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/Mosque'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    MosqueImageUploadPayload:
      type: object
      required: [imageUrl, imagePath, fileName]
      properties:
        imageUrl:
          type: string
          format: uri
          example: http://localhost:4000/uploads/mosques/1711900000000-uuid.jpg
        imagePath:
          type: string
          example: /uploads/mosques/1711900000000-uuid.jpg
        fileName:
          type: string
          example: 1711900000000-uuid.jpg

    MosqueImageUploadEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/MosqueImageUploadPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    MosqueCreateRequest:
      type: object
      required: [name, addressLine, city, state, country, latitude, longitude]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 180
        addressLine:
          type: string
          minLength: 3
          maxLength: 240
        city:
          type: string
          minLength: 2
          maxLength: 120
        state:
          type: string
          minLength: 2
          maxLength: 120
        country:
          type: string
          minLength: 2
          maxLength: 120
          default: India
        postalCode:
          type: string
          maxLength: 20
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        contactName:
          type: string
          maxLength: 160
        contactPhone:
          type: string
          maxLength: 40
        contactEmail:
          type: string
          format: email
        websiteUrl:
          type: string
          format: uri
        imageUrl:
          type: string
          format: uri
          description: Existing remote image URL or the URL returned by the mosque upload route
        imageUrls:
          type: array
          maxItems: 10
          description: Ordered mosque gallery images. The first item is the primary cover image.
          items:
            type: string
            format: uri
        sect:
          type: string
          enum: [Sunni, Shia, Mixed, Community]
        duhrTime:
          type: string
          maxLength: 32
        asrTime:
          type: string
          maxLength: 32
        prayerTimeConfig:
          $ref: '#/components/schemas/PrayerTimeConfigWritePayload'
        facilities:
          type: array
          maxItems: 20
          items:
            type: string
        content:
          $ref: '#/components/schemas/MosqueContentWritePayload'

    PrayerTimeAdjustments:
      type: object
      properties:
        fajr:
          type: integer
          minimum: -59
          maximum: 59
        sunrise:
          type: integer
          minimum: -59
          maximum: 59
        dhuhr:
          type: integer
          minimum: -59
          maximum: 59
        asr:
          type: integer
          minimum: -59
          maximum: 59
        maghrib:
          type: integer
          minimum: -59
          maximum: 59
        isha:
          type: integer
          minimum: -59
          maximum: 59

    PrayerTimeConfigWritePayload:
      type: object
      required: [enabled, calculationMethod, school, adjustments]
      properties:
        enabled:
          type: boolean
        calculationMethod:
          type: integer
          minimum: 0
          maximum: 99
        school:
          type: string
          enum: [standard, hanafi]
        adjustments:
          $ref: '#/components/schemas/PrayerTimeAdjustments'

    PrayerTimeCalculationMethod:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    PrayerTimeSchool:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          enum: [standard, hanafi]
        label:
          type: string

    PrayerTimeConfiguration:
      type: object
      required:
        [enabled, latitude, longitude, calculationMethod, school, adjustments]
      properties:
        enabled:
          type: boolean
        latitude:
          type: number
        longitude:
          type: number
        calculationMethod:
          $ref: '#/components/schemas/PrayerTimeCalculationMethod'
        school:
          $ref: '#/components/schemas/PrayerTimeSchool'
        adjustments:
          $ref: '#/components/schemas/PrayerTimeAdjustments'

    PrayerTimeDayPayload:
      type: object
      required:
        [mosqueId, date, status, isConfigured, isAvailable, source, nextPrayer, nextPrayerTime]
      properties:
        mosqueId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        status:
          type: string
          enum: [ready, not_configured, disabled, temporarily_unavailable]
        isConfigured:
          type: boolean
        isAvailable:
          type: boolean
        source:
          type: string
          enum: [aladhan, cache, none]
        unavailableReason:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        configuration:
          allOf:
            - $ref: '#/components/schemas/PrayerTimeConfiguration'
          nullable: true
        timings:
          type: object
          nullable: true
          properties:
            fajr:
              type: string
            sunrise:
              type: string
            dhuhr:
              type: string
            asr:
              type: string
            maghrib:
              type: string
            isha:
              type: string
        nextPrayer:
          type: string
        nextPrayerTime:
          type: string
        cachedAt:
          type: string
          format: date-time
          nullable: true

    MosqueAbout:
      type: object
      properties:
        title:
          type: string
        body:
          type: string

    MosqueContentItem:
      type: object
      required: [id, title, schedule, posterLabel]
      properties:
        id:
          type: string
        title:
          type: string
        schedule:
          type: string
        posterLabel:
          type: string
        location:
          type: string
        description:
          type: string

    MosqueConnectLink:
      type: object
      required: [id, type, label, value]
      properties:
        id:
          type: string
        type:
          type: string
          example: instagram
        label:
          type: string
        value:
          type: string

    MosqueContentPayload:
      type: object
      required: [events, classes, connect]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/MosqueContentItem'
        classes:
          type: array
          items:
            $ref: '#/components/schemas/MosqueContentItem'
        connect:
          type: array
          items:
            $ref: '#/components/schemas/MosqueConnectLink'
        about:
          $ref: '#/components/schemas/MosqueAbout'

    MosqueContentWritePayload:
      type: object
      properties:
        events:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/MosqueContentItem'
        classes:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/MosqueContentItem'
        connect:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/MosqueConnectLink'
        about:
          $ref: '#/components/schemas/MosqueAbout'

    MosqueContentEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/MosqueContentPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    MosqueUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/MosqueCreateRequest'
        - type: object
          properties:
            content:
              $ref: '#/components/schemas/MosqueContentWritePayload'

    MosqueImageUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    MosqueAdminUpdatePayload:
      type: object
      required: [mosque, content]
      properties:
        mosque:
          $ref: '#/components/schemas/Mosque'
        content:
          $ref: '#/components/schemas/MosqueContentPayload'

    MosqueAdminUpdateEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/MosqueAdminUpdatePayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    PrayerTimeDayEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/PrayerTimeDayPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    ReviewRequest:
      type: object
      required: [rating]
      properties:
        mosqueId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comments:
          type: string
          maxLength: 250

    ReviewPayload:
      type: object
      required: [id, mosqueId, rating, comments, createdAt]
      properties:
        id:
          type: string
          format: uuid
        mosqueId:
          type: string
          format: uuid
        rating:
          type: integer
        comments:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/ReviewPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    ReviewListItem:
      type: object
      required: [id, userName, rating, comment, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userName:
          type: string
        rating:
          type: number
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewListSummary:
      type: object
      required: [averageRating, totalReviews]
      properties:
        averageRating:
          type: number
        totalReviews:
          type: integer

    ReviewListPayload:
      type: object
      required: [items, summary]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewListItem'
        summary:
          $ref: '#/components/schemas/ReviewListSummary'

    ReviewListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/ReviewListPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BroadcastMessageItem:
      type: object
      required: [id, title, description, publishedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        publishedAt:
          type: string
          format: date-time

    BroadcastMessageListPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastMessageItem'

    BroadcastMessageListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BroadcastMessageListPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BroadcastPublishRequest:
      type: object
      required: [title, message]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 180
        message:
          type: string
          minLength: 1
          maxLength: 2000

    BroadcastMessageEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BroadcastMessageItem'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BookmarkCreateRequest:
      type: object
      required: [mosqueId]
      properties:
        mosqueId:
          type: string
          format: uuid

    BookmarkCreatePayload:
      type: object
      required: [mosqueId, status]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        mosqueId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [created, already_bookmarked]

    BookmarkCreateEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BookmarkCreatePayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BookmarkListItem:
      type: object
      required:
        [id, name, city, country, latitude, longitude, facilities, isVerified, bookmarkedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        addressLine:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        country:
          type: string
        postalCode:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number
        facilities:
          type: array
          items:
            type: string
        isVerified:
          type: boolean
        bookmarkedAt:
          type: string
          format: date-time

    BookmarkListPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookmarkListItem'

    BookmarkListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/BookmarkListPayload'
        error:
          nullable: true
          example: null
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    NotificationSetting:
      type: object
      required: [title, description, isEnabled]
      properties:
        title:
          type: string
        description:
          type: string
        isEnabled:
          type: boolean

    NotificationSettingsRequest:
      type: object
      required: [mosqueId, settings]
      properties:
        mosqueId:
          type: string
          format: uuid
        settings:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/NotificationSetting'

    NotificationSettingsPayload:
      type: object
      required: [success, settings]
      properties:
        success:
          type: boolean
        settings:
          type: array
          items:
            $ref: '#/components/schemas/NotificationSetting'

    NotificationSettingsEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/NotificationSettingsPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    NotificationSettingsReadPayload:
      type: object
      required: [mosqueId, settings]
      properties:
        mosqueId:
          type: string
          format: uuid
        settings:
          type: array
          items:
            $ref: '#/components/schemas/NotificationSetting'

    NotificationSettingsReadEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/NotificationSettingsReadPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    NotificationMosque:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    NotificationMosqueListPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NotificationMosque'

    NotificationMosqueListEnvelope:
      type: object
      required: [data, error, meta]
      properties:
        data:
          $ref: '#/components/schemas/NotificationMosqueListPayload'
        error:
          nullable: true
          example: null
        meta:
          type: object
          example: {}

    BusinessListingStatus:
      type: string
      enum: [draft, under_review, live, rejected]

    BusinessListingSubmitter:
      type: object
      required: [id, fullName, email]
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email

    TimeOfDay:
      type: object
      required: [hour, minute]
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        minute:
          type: integer
          minimum: 0
          maximum: 59

    BusinessListingLogo:
      type: object
      properties:
        fileName:
          type: string
          nullable: true
        bytesBase64:
          type: string
          nullable: true
        contentType:
          type: string
          nullable: true
        tileBackgroundColor:
          type: integer
