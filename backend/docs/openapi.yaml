  /api/v1/services:
    get:
      tags: [Services]
      summary: List service cards for a category
      description: Returns the public services feed for a supported category. Only approved business listings whose moderation status is `live` appear here; `draft`, `under_review`, and `rejected` listings are never exposed. Supported category aliases are normalized onto the public feed taxonomy. Today the supported public categories are `Halal Food` and `Islamic Books`; supported aliases include food-specific labels such as `Catering Services` and the book-specific alias `Books & Stationery`. Approved listings outside those explicit mappings remain private to moderation/business-listing flows and unsupported public category queries return `400`. The route currently supports category plus filter chips only; there is no keyword search contract yet.
      parameters:
        - name: category
          in: query
          required: true
          description: Public services category or supported alias. Unsupported categories fail validation.
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: filters
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesEnvelope'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

